services:
  nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
    volumes:
      - nats-data:/data
    restart: unless-stopped

  relay:
    build:
      context: .
      dockerfile: crates/mwt-relay/Dockerfile
    ports:
      - "3001:3001"
    environment:
      LISTEN_ADDR: "0.0.0.0:3001"
      NATS_URL: "nats://nats:4222"
      DEV_NO_AUTH: "true"
      # TURN_SECRET: "change-me-use-openssl-rand-hex-32"
      # TURN_URLS: "turn:messages.stelling19.nl:3478,turns:messages.stelling19.nl:5349"
    depends_on:
      - nats
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    environment:
      DETECT_EXTERNAL_IP: "yes"
    command: >
      -n
      --realm=messages.stelling19.nl
      --listening-port=3478
      --tls-listening-port=5349
      --min-port=49152
      --max-port=65535
      --use-auth-secret
      --static-auth-secret=change-me-use-openssl-rand-hex-32
      --no-multicast-peers
      --log-file=stdout
      --simple-log
    restart: unless-stopped

volumes:
  nats-data:
